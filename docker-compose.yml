services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${DB_NAME:-dxtx_flows}
      POSTGRES_PASSWORD: ${DB_PASS:-squid}
      POSTGRES_USER: ${DB_USER:-squid}
    ports:
      - "${DB_PORT:-15432}:5432"
    volumes:
      - dxtx-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-squid} -d ${DB_NAME:-dxtx_flows}"]
      interval: 10s
      timeout: 5s
      retries: 5
    shm_size: 1gb

volumes:
  dxtx-postgres-data:
